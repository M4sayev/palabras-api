<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../globals.css" />
    <title>Log in</title>
  </head>
  <body class="min-h-screen flex-center">
    <div class="auth-card">
      <h1>Forgot your password?</h1>

      <form id="forgotPasswordForm" class="auth-form" method="POST" novalidate>
        <p class="auth-form__error" id="formError" role="alert"></p>

        <div class="field">
          <label for="email">Email</label>
          <input
            type="email"
            name="email"
            id="email"
            autocomplete="email"
            required
          />
        </div>

        <button type="submit" class="std-btn">Send a reset link</button>
      </form>
    </div>

    <script src="../scripts/forgot-password.js" type="module"></script>
  </body>
</html>
