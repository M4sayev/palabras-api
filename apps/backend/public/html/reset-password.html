<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../globals.css" />
    <title>Reset</title>
  </head>
  <body class="min-h-screen flex-center">
    <div class="auth-card">
      <h1>Reset your password</h1>

      <form id="resetPasswordForm" class="auth-form" method="POST" novalidate>
        <p class="auth-form__error" id="formError" role="alert"></p>

        <div class="field">
          <label for="password">Password</label>
          <input
            type="password"
            name="password"
            id="password"
            autocomplete="password"
            required
          />
        </div>
        <div class="field">
          <label for="repeat-password">Repeat Password</label>
          <input
            type="password"
            name="repeat-password"
            id="repeat-password"
            autocomplete="password"
            required
          />
        </div>

        <button type="submit" class="std-btn">Change your password</button>
      </form>
    </div>

    <script src="../scripts/reset-password.js" type="module"></script>
  </body>
</html>
