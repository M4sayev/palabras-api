<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./globals.css" />
    <title>Reset</title>
  </head>
  <body class="min-h-screen flex-center">
    <div class="auth-card">
      <h1>Reset your password</h1>

      <form id="resetPasswordForm" class="auth-form" method="POST" novalidate>
        <div class="field">
          <label for="newPassword">Password</label>
          <input
            type="password"
            name="newPassword"
            id="newPassword"
            autocomplete="password"
            required
            aria-invalid="false"
          />
          <p
            class="auth-form__error--field"
            id="passwordErrorOne"
            role="alert"
          ></p>
        </div>
        <div class="field">
          <label for="repeatPassword">Repeat Password</label>
          <input
            type="password"
            name="repeatPassword"
            id="repeatPassword"
            autocomplete="password"
            required
            aria-invalid="false"
          />
          <p
            class="auth-form__error--field"
            id="passwordErrorTwo"
            role="alert"
          ></p>
        </div>

        <p class="auth-form__error" id="genericError" role="alert"></p>
        <button type="submit" class="std-btn">Change your password</button>
      </form>
    </div>

    <script src="./src/auth/scripts/reset-password.js" type="module"></script>
  </body>
</html>
