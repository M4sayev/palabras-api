<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./globals.css" />
    <title>Our Dictionary</title>
  </head>
  <body class="min-h-screen flex-center">
    <header class="page-header">
      <h1>Our Dictionary</h1>
      <p class="page-header__tagline">a small, growing card catalog of words</p>
    </header>

    <div id="container">
      <section class="word-form-card" id="wordFormCard">
        <h2 class="word-form-card__title" id="wordFormTitle">Add a word</h2>

        <form id="wordForm" class="word-form" novalidate>
          <input type="hidden" id="wordId" value="" />

          <p class="auth-form__error" id="wordFormError" role="alert"></p>

          <div class="word-form__row">
            <div class="field">
              <label for="wordInput">Word</label>
              <input type="text" id="wordInput" required />
            </div>

            <div class="field">
              <label for="categorySelect">Category</label>
              <select id="categorySelect" required>
                <option value="" disabled selected>Choose a category</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="definitionInput">Definition</label>
            <textarea id="definitionInput" rows="2" required></textarea>
          </div>

          <div class="field">
            <label for="exampleInput">Example sentence</label>
            <textarea id="exampleInput" rows="2" required></textarea>
          </div>

          <div class="word-form__actions">
            <button type="submit" class="std-btn" id="wordFormSubmitBtn">
              Add word
            </button>
            <button
              type="button"
              class="std-btn std-btn--ghost"
              id="wordFormCancelBtn"
              hidden
            >
              Cancel
            </button>
          </div>
        </form>
      </section>

      <div class="toolbar">
        <form class="dictionary__search" id="searchForm">
          <label for="search">search for words</label>
          <input
            type="text"
            name="words"
            id="search"
            placeholder="Search for words"
          />
          <label for="cat">search for category</label>
          <select name="category" id="cat">
            <option value="">All categories</option>
          </select>
          <button type="submit" class="std-btn">Search</button>
        </form>

        <div class="selection-bar">
          <span
            class="selection-bar__count"
            id="selectionCount"
            aria-live="polite"
            >0</span
          >
          <button
            type="button"
            class="std-btn std-btn--danger"
            id="deleteSelectedBtn"
            disabled
          >
            Delete selected
          </button>
        </div>
      </div>

      <ul id="wordList" class="dictionary__list"></ul>
    </div>

    <dialog class="confirm-dialog" id="deleteSelectedDialog">
      <div class="confirm-dialog__card">
        <h2>Delete <span id="bulkDeleteCountLabel">0</span> words?</h2>
        <p>
          This permanently removes the selected words. This can't be undone.
        </p>
        <div class="confirm-dialog__actions">
          <button type="button" class="std-btn" id="cancelBulkDeleteBtn">
            Cancel
          </button>
          <button
            type="button"
            class="std-btn std-btn--danger"
            id="confirmBulkDeleteBtn"
          >
            Delete selected
          </button>
        </div>
      </div>
    </dialog>

    <script type="module">
      import { initAccountMenu } from "@/account/scripts/account-menu.js";
      initAccountMenu();
    </script>
    <script src="./main.js" type="module"></script>
  </body>
</html>
